services:
  # ===========================================
  # PostgreSQL Database
  # ===========================================
  postgres:
    image: postgres:15-alpine
    container_name: specpulse-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: specpulse
      POSTGRES_USER: specpulse
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U specpulse -d specpulse" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - specpulse-network

  # ===========================================
  # SpecPulse Application (Backend + Frontend)
  # ===========================================
  specpulse:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: specpulse-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/specpulse
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:specpulse}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      SPRING_PROFILES_ACTIVE: docker
      JAVA_OPTS: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0"
      LOGGING_LEVEL_ROOT: INFO
      LOGGING_LEVEL_COM_SPECPULSE: DEBUG
    ports:
      - "8080:8080"
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:8080/actuator/health" ]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 60s
    networks:
      - specpulse-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
    driver: local

networks:
  specpulse-network:
    driver: bridge
