# Docker profile configuration
server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/specpulse
    username: specpulse
    password: specpulse
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  
  flyway:
    enabled: true
    locations: classpath:db/migration

# Scheduler configuration
specpulse:
  scheduler:
    enabled: true
    pull-interval-seconds: 300

# Actuator endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}

# Logging
logging:
  level:
    root: INFO
    com.specpulse: INFO
    org.flywaydb: INFO
