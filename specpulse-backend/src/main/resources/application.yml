server:
  port: 8080

spring:
  application:
    name: specpulse
  
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/specpulse}
    username: ${SPRING_DATASOURCE_USERNAME:specpulse}
    password: ${SPRING_DATASOURCE_PASSWORD:specpulse}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
  
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

# Scheduler configuration
specpulse:
  scheduler:
    enabled: true
    pull-interval-seconds: 300

# Actuator endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}

# Logging
logging:
  level:
    root: INFO
    com.specpulse: INFO
    org.flywaydb: INFO
