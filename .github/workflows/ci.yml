name: CI

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master, develop ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: specpulse_test
          POSTGRES_USER: specpulse
          POSTGRES_PASSWORD: specpulse
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: specpulse-frontend/package-lock.json

      - name: Start PostgreSQL for tests
        run: |
          docker run -d \
            -e POSTGRES_DB=specpulse_test \
            -e POSTGRES_USER=specpulse \
            -e POSTGRES_PASSWORD=specpulse \
            -p 5432:5432 \
            --name postgres-test \
            postgres:15-alpine
          sleep 5

      - name: Build Backend
        run: ./gradlew :specpulse-backend:build -x test

      - name: Test Backend
        run: ./gradlew :specpulse-backend:test
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/specpulse_test
          SPRING_DATASOURCE_USERNAME: specpulse
          SPRING_DATASOURCE_PASSWORD: specpulse

      - name: Build Frontend
        working-directory: specpulse-frontend
        run: |
          npm ci
          npm run build

      - name: Test Frontend
        working-directory: specpulse-frontend
        run: npm run test -- --run

      - name: Upload Backend Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results
          path: specpulse-backend/build/test-results/test/

      - name: Upload Frontend Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-test-results
          path: specpulse-frontend/coverage/

  code-quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: specpulse-frontend/package-lock.json

      - name: Check Backend Code Style
        run: ./gradlew :specpulse-backend:checkstyleMain :specpulse-backend:checkstyleTest

      - name: Lint Frontend
        working-directory: specpulse-frontend
        run: npm run lint

      - name: Type Check Frontend
        working-directory: specpulse-frontend
        run: npx tsc --noEmit

  security:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Run OWASP Dependency Check
        run: ./gradlew :specpulse-backend:dependencyCheckAnalyze
        continue-on-error: true
